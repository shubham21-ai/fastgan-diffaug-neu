# FastGAN + DiffAugment — NEU-DET 128×128 Configuration
# ========================================================
# This config is tuned for:
#   - NEU Surface Defect Dataset, 25 images/class (150 total)
#   - Kaggle P100 (16 GB) or T4 (15 GB) GPU
#   - Estimated VRAM usage: ~6–7 GB
#   - Estimated training time: ~3–4 hours for 100k iterations

# ── Data ──────────────────────────────────────────────────────────────────────
# Set this to the actual dataset path before training
data_path:   "/kaggle/input/neu-surface-defect-database"
n_per_class: 25           # Images per defect class (6 classes → 150 total)
image_size:  128          # Generator output resolution (px)
num_workers: 2            # DataLoader workers (2 is safe on Kaggle)
seed:        42           # Reproducibility seed

# ── Architecture ──────────────────────────────────────────────────────────────
nz:  256                  # Latent vector dimension z ~ N(0,1)^nz
ngf: 64                   # Generator base filter count
ndf: 64                   # Discriminator base filter count
# Channel schedule at 128×128:
#   G: 512 → 256 → 128 → 64 → 32 → 16 → RGB
#   D: 64  → 128 → 256 → 512 → 512 → pred

# ── Training ──────────────────────────────────────────────────────────────────
batch_size:    16         # Safe at 128×128 on P100 with AMP
total_iter:    100000     # ~3–4 hours on Kaggle P100
lr_g:          0.0002     # Generator learning rate
lr_d:          0.0002     # Discriminator learning rate
beta1:         0.5        # Adam β₁ (lower than default = faster early convergence)
ema_decay:     0.999      # EMA smoothing factor for generator weights

# ── DiffAugment ───────────────────────────────────────────────────────────────
# Applied symmetrically to BOTH real and fake before discriminator
# 'color'       → brightness + saturation + contrast
# 'translation' → ±12.5% pixel shift
# 'cutout'      → 50% area random box masking
aug_policy:    "color,translation,cutout"

# ── Losses ────────────────────────────────────────────────────────────────────
percept_weight: 1.0       # Weight on discriminator reconstruction LPIPS loss

# ── Saving & Logging ──────────────────────────────────────────────────────────
save_dir:   "/kaggle/working"   # Checkpoints + images + logs
save_every: 500                 # Save checkpoint every N iterations
log_every:  50                  # Print loss metrics every N iterations
vis_every:  2000                # Save sample image grid every N iterations
